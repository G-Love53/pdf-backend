name: Leg 2 Robot Heartbeat

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: heartbeat-wake-up-service
  cancel-in-progress: false

jobs:
  wake-up-service:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Poke the Robot
        env:
          # CID-PDF-API has no /check-quotes; /healthz is the liveness probe (see src/server.js).
          HEARTBEAT_URL: https://cid-pdf-api.onrender.com/healthz
        run: |
          set -euo pipefail

          echo "Sending heartbeat to ${HEARTBEAT_URL}"
          # Harden against transient network/cold-start hiccups:
          # - fail on HTTP 4xx/5xx
          # - cap total request time
          # - retry with backoff before failing the workflow
          curl --request GET "${HEARTBEAT_URL}" \
            --fail \
            --silent \
            --show-error \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            --retry-max-time 90 \
            --retry-all-errors
